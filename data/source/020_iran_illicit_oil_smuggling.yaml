- id: 020_iran_illicit_oil_smuggling-12
  description: A customer makes transactions involving companies that originate with,
    or are directed to, entities that are general trading companies, suspected front
    companies, or companies that have a nexus with Iran. Other indicators of possible
    front companies include opaque ownership structures, individuals/entities with
    obscure names that direct the company, or business addresses that are residential
    or co-located with other companies, especially companies that have been previously
    sanctioned.
