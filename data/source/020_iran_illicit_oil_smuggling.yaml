- id: 020_iran_illicit_oil_smuggling-05
  description: Transactions involving a petroleum or shipping company reveal that
    it does business with counterparties that have ties to Iran or transports goods
    using vessels that have ties to Iran or that maritime databases indicate have
    made stops at Iranian ports.
