- id: 020_iran_illicit_oil_smuggling-01
  description: Documentation associated with a customer’s oil shipping-related transactions
    is inconsistent with information contained in maritime database entries used for
    conducting due diligence. For example, a maritime database may indicate that a
    vessel called in an Iranian port, even though this information is not included
    in the shipping documents submitted to financial institutions for payment processing.
  product_types:
  - trade_finance
  - wire_transfer
  industry_types:
  - maritime_shipping
  - oil_and_gas
  customer_profiles:
  - cross_border_business
  geographic_footprints:
  - iran
  regulatory_source: FinCEN Advisory on the Iranian Regime’s Illicit Oil Smuggling
    Activities, Shadow Banking Networks, and Weapons Procurement Efforts
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2025-06-06'
  risk_level: high
  category: sanctions_evasion
  source_url: https://www.fincen.gov/system/files/FinCEN-Advisory-Illicit-Oil-Smuggling-508.pdf
- id: 020_iran_illicit_oil_smuggling-02
  description: Documentation associated with a customer’s oil-related transactions
    makes reference to vessels that, according to maritime databases, have undergone
    recent or multiple name or flag changes, or transfer of ownership or operation
    to another person following OFAC’s designation of its owner or operator, but the
    designated owner or operator appears to maintain an interest in the vessel.
