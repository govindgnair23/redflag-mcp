- id: 020_iran_illicit_oil_smuggling-04
  description: Documentation associated with a customer’s oil-related transactions
    makes reference to “Malaysian blend” oil, particularly if the vessel is bound
    for China by way of Southeast Asia and if maritime databases indicate that the
    vessel displayed AIS irregularities during its voyage or reveal evidence of a
    ship-to-ship transfer in proximity to Southeast Asia.
