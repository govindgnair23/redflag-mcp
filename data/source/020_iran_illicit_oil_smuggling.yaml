- id: 020_iran_illicit_oil_smuggling-03
  description: Documentation associated with a customer’s oil-related transactions
    makes reference to vessels that claim an International Maritime Organization (IMO)
    number that, on examination of maritime databases, belong to a different vessel
    or to vessels that have previously been scrapped.
