- id: 035_timeshare_fraud_mexico_tcos-01
  description: A customer is uncharacteristically wiring funds to Mexico and indicates
    the need to send the funds immediately to pay “taxes” or “fees” to apparent timeshare
    brokers or else risk losing an urgent financial opportunity regarding their timeshare.
  product_types:
  - wire_transfer
  industry_types:
  - travel_hospitality
  - real_estate
  customer_profiles:
  - individual_consumer
  - elderly_or_vulnerable_person
  geographic_footprints:
  - mexico
  regulatory_source: FIN-2024-NTC2 July 16, 2024 FinCEN, OFAC, and FBI Joint Notice
    on Timeshare Fraud Associated with Mexico-Based Transnational Criminal Organizations
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2024-07-16'
  risk_level: high
  category: fraud_nexus
  source_url: https://www.fincen.gov/system/files/shared/FinCEN-Joint-Notice-Timeshare-Mexico-508C-FINAL.pdf
- id: 035_timeshare_fraud_mexico_tcos-02
  description: A customer is uncharacteristically sending international wire transfers
    from retirement accounts or trust accounts to Mexican financial institutions directly
    or by first sending the funds to their personal checking or savings accounts either
    through an internal transfer within their financial institution or by a wire transfer
    to their accounts held at another financial institution and then immediately wiring
    the funds to Mexico.
  product_types:
  - wire_transfer
  - depository
  industry_types:
  - travel_hospitality
