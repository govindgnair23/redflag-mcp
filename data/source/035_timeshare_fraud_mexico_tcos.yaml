  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2024-07-16'
  risk_level: high
  category: fraud_nexus
  source_url: https://www.fincen.gov/system/files/shared/FinCEN-Joint-Notice-Timeshare-Mexico-508C-FINAL.pdf
