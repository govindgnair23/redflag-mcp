- id: 038_payroll_tax_workers_comp_fraud-01
  description: The customer is a new (i.e., less than two years old) small construction
    company specializing in one type of construction trade (e.g., framing, drywall,
    stucco, masonry, painting, etc.) with minimal to no online presence and has indicators
    of being a shell company for illicit activity.
  product_types:
  - depository
  - check_cashing
  industry_types:
  - construction
  customer_profiles:
  - newly_established_business
  - shell_or_front_company
  geographic_footprints:
  - domestic_us
  regulatory_source: FinCEN Notice FIN-2023-NTC1
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2023-08-15'
  risk_level: medium
  category: shell_company
  source_url: https://www.fincen.gov/system/files/2025-09/FinCEN_Notice_Payroll_Tax_Evasion_and_Workers_Comp_508.pdf
