- id: 038_payroll_tax_workers_comp_fraud-04
  description: The company’s recently acquired workers’ compensation insurance policy,
    which may be verifiable through an official state website, was issued within the
    last year and covers only a small number of employees. However, a high volume
    of transactions is observed in the company’s bank accounts, which is not commensurate
    with a construction company of that size.
  product_types:
  - depository
  - insurance
  industry_types:
  - construction
  customer_profiles:
  - shell_or_front_company
  geographic_footprints:
  - domestic_us
  regulatory_source: FinCEN Notice FIN-2023-NTC1
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2023-08-15'
  risk_level: medium
  category: layering
  source_url: https://www.fincen.gov/system/files/2025-09/FinCEN_Notice_Payroll_Tax_Evasion_and_Workers_Comp_508.pdf
- id: 038_payroll_tax_workers_comp_fraud-05
  description: A customer receives weekly deposits in their account that exceed normal
    account activity from several construction contractors involved in multiple construction
    trades (e.g., framing, drywall, stucco, masonry, painting, etc.). The deposits
    may be conducted from locations in multiple cities or states.
  product_types:
  - depository
  industry_types:
  - construction
  customer_profiles:
  - small_business
  geographic_footprints:
  - domestic_us
  regulatory_source: FinCEN Notice FIN-2023-NTC1
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2023-08-15'
  risk_level: medium
  category: layering
  source_url: https://www.fincen.gov/system/files/2025-09/FinCEN_Notice_Payroll_Tax_Evasion_and_Workers_Comp_508.pdf
- id: 038_payroll_tax_workers_comp_fraud-06
  description: A customer engages in behavior that suggests efforts to evade CTR filing
    requirements (e.g., the account holder or company representative alters or cancels
    a transaction when advised a CTR would be filed or engages in structuring with
    multiple check payments for under $10,000).
  product_types:
  - depository
