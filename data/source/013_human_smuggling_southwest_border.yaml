- id: 013_human_smuggling_southwest_border-01
  description: Transactions involving multiple wire transfers, cash deposits, or P2P
    payments from multiple originators from different geographic locations either
    across (1) the United States, or (2) Mexico and Central America, to one beneficiary
    located on or around the SW border, with no apparent business purpose.
  product_types:
  - wire_transfer
  - depository
  - crypto
  industry_types: []
  customer_profiles:
  - cross_border_business
  geographic_footprints:
  - domestic_us
  - mexico
  - central_america
  - southwest_border
  regulatory_source: FinCEN Alert FIN-2023-Alert001
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2023-01-13'
  risk_level: high
  category: human_smuggling
  source_url: https://www.fincen.gov/system/files/shared/FinCEN%20Alert%20Human%20Smuggling%20FINAL_508.pdf
