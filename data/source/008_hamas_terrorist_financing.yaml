- id: 008_hamas_terrorist_financing-01
  description: A customer or a customer’s counterparty conducts transactions with
    OFAC-designated entities and individuals, or transactions that contain a nexus
    to identifiers listed for OFAC-designated entities and individuals, to include,
    email addresses, physical addresses, phone numbers, or passport numbers, or virtual
    currency addresses.
