- id: 008_hamas_terrorist_financing-03
  description: A customer conducts transactions with a Money Services Business (MSB)
    or other financial institution, including one that offers services in virtual
    currency, operates in higher-risk jurisdictions tied to Hamas activity, and is
    reasonably believed or suspected to have lax customer due diligence (CDD) requirements,
    opaque ownership, or otherwise fails to comply with anti-money laundering/combatting
    the financing of terrorism (AML/CFT) best practices.
  product_types:
  - depository
  - wire_transfer
  - crypto
