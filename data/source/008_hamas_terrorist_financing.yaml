- id: 008_hamas_terrorist_financing-04
  description: A customer conducts transactions that originate with, are directed
    to, or otherwise involve entities that are shell corporations, general “trading
    companies,” or other companies that have a nexus with Iran or other Iran-supported
    terrorist groups, such as Hizballah and Palestine Islamic Jihad.
  product_types:
