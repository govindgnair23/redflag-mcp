- id: 027_covid_economic_impact_payments-02
  description: 'When questioned, the customer may disclose that he or she: (i) was
    sent a partial payment, and needed to verify his or her PII or financial information
    before receiving the full EIP; or (ii) received the check purportedly from a current
    or former employer with instructions that the check was the customer’s “stimulus
    payment” and that he or she was to buy prepaid cards and send them to another
    individual.'
  product_types:
  - depository
  - prepaid
  industry_types:
  - payroll
  customer_profiles:
  - individual_consumer
  geographic_footprints:
  - domestic_us
