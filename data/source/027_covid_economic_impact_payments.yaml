- id: 027_covid_economic_impact_payments-10
  description: After the funds are consolidated, the funds may be quickly (a) withdrawn
    via large cash withdrawals or serial ATM withdrawals; (b) used to purchase convertible
    virtual currencies (CVC); (c) transferred out of the account via a money services
    business such as cryptocurrency exchangers and peer-to-peer mobile payment systems,
    or wire transfers to other accounts; (d) used for large purchases at merchants
    that offer cash back as an option, in amounts not typical of this type of merchant;
    or (e) transferred onto prepaid debit or gift cards.
  product_types:
  - depository
  - wire_transfer
  - money_transmitter
  - prepaid
  - crypto
  industry_types:
  - crypto
  - retail
  customer_profiles:
