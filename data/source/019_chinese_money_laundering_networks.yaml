- id: 019_chinese_money_laundering_networks-04
  description: A customer, especially a Chinese national, creates an account at a
    financial institution and reports their occupation as a student during the onboarding
    process. This customer then regularly deposits cash into their account or receives
    wire transfers notated as “tuition” or “living expenses” that are not commensurate
    with the reported information. After receiving the funds, the customer may subsequently
    initiate wire transfers or P2P transactions to unknown individuals who are unrelated
    to the purpose of the wire transfers or may make credit or debit card payments.
  product_types:
  - depository
  - wire_transfer
