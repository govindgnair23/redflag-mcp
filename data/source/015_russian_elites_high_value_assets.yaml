- id: 015_russian_elites_high_value_assets-01
  description: 'The purchase, sale, donation, or legal ownership transfer of high-value
    real estate in the name of a foreign legal entity, shell company, or trust, especially
    if the transaction: (i) is far above or below fair market value, (ii) involves
    all-cash transfers, or (iii) is funded by a third party with a known nexus to
    sanctioned Russian elites and their proxies.'
  product_types:
  - depository
  - wire_transfer
  industry_types:
  - real_estate
