- id: 001_federal_child_nutrition_fraud-01
  description: A customer is a company or NPO serving as a sponsor for a government
    benefit program that suddenly receives and disburses a significant number of reimbursements
    in a short timeframe inconsistent with the customer profile of other similar entities.
  product_types:
  - depository
  - money_transmitter
  regulatory_source: FinCEN Alert FIN-2026-Alert001
  risk_level: medium
  category: fraud_nexus
