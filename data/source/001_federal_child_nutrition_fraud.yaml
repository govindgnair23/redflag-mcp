- id: 001_federal_child_nutrition_fraud-11
  description: A customer that is a company or NPO, enrolled in a government benefit
    program, or the customer’s employee, engages in behavior suggesting efforts to
    evade the Currency Transaction Report (CTR) reporting requirement (e.g., alters
    or cancels a transaction when advised a CTR would be filed or engages in structuring
    with multiple cash transactions for under $10,000), as well as avoiding recordkeeping
    requirements.
  product_types:
  - depository
  - money_transmitter
  regulatory_source: FinCEN Alert FIN-2026-Alert001
  risk_level: high
  category: structuring
  simulation_type: 3B
  source_url: https://www.fincen.gov/system/files/2026-01/FinCEN-Alert-Federal-Child-Nutrition-Programs.pdf
- id: 001_federal_child_nutrition_fraud-12
  description: A customer is a company or NPO enrolled in a government benefit program
