  product_types:
  - depository
  - money_transmitter
  - correspondent_banking
  regulatory_source: FinCEN Alert FIN-2026-Alert001
  risk_level: medium
  category: layering
  simulation_type: 2C
  source_url: https://www.fincen.gov/system/files/2026-01/FinCEN-Alert-Federal-Child-Nutrition-Programs.pdf
- id: 001_federal_child_nutrition_fraud-13
  description: A customer is a company or NPO enrolled in a government benefit program
