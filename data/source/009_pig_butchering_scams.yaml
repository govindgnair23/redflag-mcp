- id: 009_pig_butchering_scams-10
  description: A customer with a short history of conducting several small-value EFTs
    to a VASP abruptly stops sending EFTs and begins sending multiple high-value wire
    transfers to accounts of holding companies, limited liability corporations, and
    individuals with which the customer has no prior transaction history. This is
    indicative of a victim sending trial transactions to a scammer before committing
    to and sending larger amounts.
  product_types:
