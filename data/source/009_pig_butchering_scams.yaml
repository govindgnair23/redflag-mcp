- id: 009_pig_butchering_scams-13
  description: A customer mentions visiting a website or application that is purported
    to be associated with a legitimate VASP or business involved in investing in virtual
    currency. The website or application shows warning signs such as a web address
    or domain name that is misspelled in such a manner as to resemble that of another
    business, a recently registered web address or domain name, no physical street
    address, international contact information, or contact methods that include only
    chat or email.25
  product_types:
  - crypto
  industry_types:
