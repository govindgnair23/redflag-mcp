- id: 026_ransomware_ransom_payments-10
  description: A customer receives CVC from an external wallet, and immediately initiates
    multiple, rapid trades among multiple CVCs, especially AECs, with no apparent
    related purpose, followed by a transaction off the platform. This may be indicative
    of attempts to break the chain of custody on the respective blockchains or further
    obfuscate the transaction.
