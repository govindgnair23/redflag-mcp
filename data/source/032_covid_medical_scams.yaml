- id: 032_covid_medical_scams-20
  description: The customer’s account is used in transactions for COVID-19-related
    goods, such as masks and gloves, with a company that is not a medical supply distributor,
    is involved in other non-medical-related industries, or is not known to have repurposed
    its manufacturing to create medical-related goods. For example, the company is
    currently selling medical and sanitary supplies, and prior to January 2020, the
    company was listed as an automotive shop, a lumberyard, or a restaurant.
