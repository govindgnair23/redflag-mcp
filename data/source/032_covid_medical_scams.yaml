    For example, prior to January 2020, the customer never linked their account to
    the sale of goods on the internet. Since the COVID-19 pandemic began, however,
    the customer is receiving deposits with payment messages indicating that they
    are for the sale of medical goods, disinfectants, sanitizers, and paper products
