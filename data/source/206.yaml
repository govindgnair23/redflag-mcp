- id: 206-07
  description: A customer regularly receives multiple P2P transfers from accounts
    with which the customer has no previous transactional relationships and for which
    there is no business or apparent lawful purpose. Payment memos may indicate or
    contain vague references disguising payment for commercial sex (e.g., “link,”
    “services,” “donation,” “personal care,” “wellness,” “advertisements,” etc.).
    These funds are then further sent via P2P, in whole or in part, to another account.
  product_types:
  - money_transmitter
  - remittance
  - prepaid
  industry_types:
  - adult_entertainment
