- id: 021_isis_financing-05
  description: A customer attempts to purchase plane or other travel tickets after
    abruptly liquidating assets, closing accounts, cancelling subscriptions, or receiving
    large unexplained sums of cash. A period of account dormancy following these behaviors
    should also be regarded as suspicious, even if the customer eventually resumes
    transactions within the United States.
  product_types:
  - depository
  - credit_card
  industry_types: []
  customer_profiles:
  - individual_consumer
  geographic_footprints:
