  risk_level: medium
  category: terrorist_financing
  source_url: https://www.fincen.gov/system/files/advisory/2025-04-01/FinCEN-Advisory-ISIS-508C.pdf
- id: 021_isis_financing-07
  description: A customer begins receiving a sudden influx of unexplained cash deposits,
    especially if that customer is unemployed or these deposits are in addition to
    a regular paycheck, or if the deposits come from ATMs in locations where ISIS
    is prevalent, but where the customer is not known to reside or have traveled.
  product_types:
  - depository
  industry_types: []
  customer_profiles:
