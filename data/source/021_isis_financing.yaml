- id: 021_isis_financing-02
  description: Fundraisers are attached to social media profiles that show support
    for ISIS or display ISIS-related iconography or refer to supporting the “mujahideen”
    or the “war against kufar (non-believers),” especially if the fundraisers are
    soliciting donations to fund travel to an area of known ISIS activity. The fundraising
    appeal posted on social media references aid to imprisoned women and children
    in Iraq or Syria.
  product_types:
  - money_transmitter
  - crypto
  industry_types: []
  customer_profiles: []
  geographic_footprints:
