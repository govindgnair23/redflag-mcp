- id: 021_isis_financing-06
  description: A customer abruptly appears to seek as many lines of credit as possible,
    for example, by acquiring several credit cards and taking out one or more loans
    for unclear reasons, especially if the customer has not used credit cards or taken
    out loans in the past. This behavior should be regarded as especially suspicious
    if the customer uses newly obtained credit cards either exclusively or almost
    exclusively for cash advances and purchases of virtual currencies but then fails
    to make loan or credit card payments when they come due.
  product_types:
  - credit_card
  - depository
  - crypto
  industry_types: []
  customer_profiles:
  - individual_consumer
  geographic_footprints: []
  regulatory_source: FinCEN Advisory on the Financing of the Islamic State of Iraq
