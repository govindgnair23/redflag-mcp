- id: fincen_alert_russian_sanctions_evasion_final_508-01
  description: Use of corporate vehicles (i.e. legal entities, such as shell companies,
    and legal arrangements) to obscure (i) ownership, (ii) source of funds, or (iii)
    countries involved, particularly sanctioned jurisdictions.
  product_types:
  - depository
  - securities
  - insurance
  - private_banking
  - correspondent_banking
  - trade_finance
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: shell_company
- id: fincen_alert_russian_sanctions_evasion_final_508-02
  description: Use of shell companies to conduct international wire transfers, often
    involving financial institutions in jurisdictions distinct from company registration.
  product_types:
  - depository
  - correspondent_banking
  - trade_finance
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: shell_company
- id: fincen_alert_russian_sanctions_evasion_final_508-03
  description: Use of third parties to shield the identity of sanctioned persons and/or
    PEPs seeking to hide the origin or ownership of funds, for example, to hide the
    purchase or sale of real estate.
  product_types:
  - depository
  - private_banking
  - securities
  - insurance
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: corruption
- id: fincen_alert_russian_sanctions_evasion_final_508-04
  description: Accounts in jurisdictions or with financial institutions that are experiencing
    a sudden rise in value being transferred to their respective areas or institutions,
    without a clear economic or business rationale.
  product_types:
  - depository
  - correspondent_banking
  - money_transmitter
  - msb
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: medium
  category: layering
- id: fincen_alert_russian_sanctions_evasion_final_508-05
  description: Jurisdictions previously associated with Russian financial flows that
    are identified as having a notable recent increase in new company formations.
  product_types:
  - depository
  - correspondent_banking
  - trade_finance
  - private_banking
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: medium
  category: shell_company
- id: fincen_alert_russian_sanctions_evasion_final_508-06
  description: Newly established accounts that attempt to send or receive funds from
    a sanctioned institution or an institution removed from the Society for Worldwide
    Interbank Financial Telecommunication (SWIFT).
  product_types:
  - depository
  - correspondent_banking
  - money_transmitter
  - msb
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: sanctions_evasion
- id: fincen_alert_russian_sanctions_evasion_final_508-07
  description: Non-routine foreign exchange transactions that may indirectly involve
    sanctioned Russian financial institutions, including transactions that are inconsistent
    with activity over the prior 12 months. For example, the Central Bank of the Russian
    Federation may seek to use import or export companies to engage in foreign exchange
    transactions on its behalf and to obfuscate its involvement.
  product_types:
  - depository
  - correspondent_banking
  - trade_finance
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: sanctions_evasion
- id: fincen_alert_russian_sanctions_evasion_final_508-08
  description: 'A customer’s transactions are initiated from or sent to the following
    types of Internet Protocol (IP) addresses: non-trusted sources; locations in Russia,
    Belarus, FATF-identified jurisdictions with AML/CFT/CP deficiencies,19 and comprehensively
    sanctioned jurisdictions; or IP addresses previously flagged as suspicious.'
  product_types:
  - crypto
  - money_transmitter
  - msb
  - depository
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: sanctions_evasion
- id: fincen_alert_russian_sanctions_evasion_final_508-09
  description: A customer’s transactions are connected to CVC addresses listed on
    OFAC’s Specially Designated Nationals and Blocked Persons List.
  product_types:
  - crypto
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: sanctions_evasion
- id: fincen_alert_russian_sanctions_evasion_final_508-10
  description: A customer uses a CVC exchanger or foreign-located MSB in a high-risk
    jurisdiction with AML/CFT/CP deficiencies, particularly for CVC entities and activities,
    including inadequate “know-your-customer” or customer due diligence measures.
  product_types:
  - crypto
  - money_transmitter
  - msb
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: medium
  category: virtual_currency
- id: fincen_alert_russian_sanctions_evasion_final_508-11
  description: A customer receives CVC from an external wallet, and immediately initiates
    multiple, rapid trades among multiple CVCs with no apparent related purpose, followed
    by a transaction off the platform. This may be indicative of attempts to break
    the chain of custody on the respective blockchains or further obfuscate the transaction.
  product_types:
  - crypto
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: layering
- id: fincen_alert_russian_sanctions_evasion_final_508-12
  description: A customer initiates a transfer of funds involving a CVC mixing service.
  product_types:
  - crypto
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: virtual_currency
- id: fincen_alert_russian_sanctions_evasion_final_508-13
  description: A customer has either direct or indirect receiving transaction exposure
    identified by blockchain tracing software as related to ransomware.
  product_types:
  - crypto
  regulatory_source: FinCEN Alert FIN-2022-Alert001
  risk_level: high
  category: ransomware
