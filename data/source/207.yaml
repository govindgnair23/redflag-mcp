- id: 207-13
  description: Authentication and account activity indicates that a user may be conducting
    digital asset transactions from Iran. For example, activity logs may show connections
    from Iranian IP addresses, or sharing IP addresses or common devices with users
    previously identified as having an Iranian nexus, authentication using an Iranian
    email service or Iranian telephone number, or use of a device with time zone,
    language, and other settings consistent with a location in Iran. Connection through
    a virtual private network (VPN), residential proxy network, or Tor exit node—when
    combined with other evidence of a location in Iran—may indicate an attempt by
    an Iranian user to circumvent geofencing.
  product_types:
  - crypto
  industry_types:
  - crypto
  customer_profiles:
  - foreign_individual
  geographic_footprints:
  - iran
  regulatory_source: FinCEN Alert FIN-2026-Alert002
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2026-05-11'
  risk_level: high
  category: cyber_enabled
  source_url: https://www.fincen.gov/system/files/2026-05/FinCEN-Alert-IRGC.pdf
- id: 207-14
  description: Account activity indicates that a customer may operate as an unregistered
    P2P exchanger, foreign-located MSB, or nested DASP that provides services in Iran.
    For example, a customer of a DASP who is located in a high-risk jurisdiction for
    Iranian illicit finance-related activity appears to be using liquidity provided
    by the DASP to execute large numbers of offsetting transactions.
  product_types:
  - crypto
  - money_transmitter
  industry_types:
  - crypto
  - money_services_business
  customer_profiles:
  - money_services_business
