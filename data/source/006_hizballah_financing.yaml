- id: 006_hizballah_financing-01
  description: A customer or a customer’s counterparty conducts transactions with
    entities and individuals that OFAC has designated due to their connection with
    Hizballah, or conducts transactions that contain a nexus to identifiers listed
    for OFAC-designated entities and individuals affiliated with Hizballah, to include
    email addresses, physical addresses, phone numbers, passport numbers, or convertible
    virtual currency addresses.
  product_types:
  - depository
  - wire_transfer
  - crypto
  - money_transmitter
  - prepaid
  industry_types: []
  customer_profiles: []
  geographic_footprints: []
  regulatory_source: FinCEN Alert FIN-2024-Alert003
  regulator: FinCEN
  regulator_jurisdiction: US
  issued_date: '2024-10-23'
  risk_level: high
  category: sanctions_evasion
  source_url: https://www.fincen.gov/system/files/shared/FinCEN-Alert-Hizballah-Alert-508C.pdf
- id: 006_hizballah_financing-02
  description: A customer or a customer’s counterparty utilizes the services of foreign
    financial institutions that have been identified as being of “primary money laundering
    concern” under section 311 of the USA PATRIOT Act referencing their association
    with, or use by, Hizballah.
  product_types:
  - correspondent_banking
  - wire_transfer
  - depository
  industry_types: []
  customer_profiles:
  - foreign_financial_institution
  geographic_footprints:
