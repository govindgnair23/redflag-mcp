- id: 006_hizballah_financing-08
  description: A customer, domestic or foreign, with businesses in the real estate,
    import/export, construction, diamonds and precious stones, or high-value art sectors
    with numerous international counterparties in high-risk jurisdictions for Hizballah
    financing, makes an unusually high number of cash deposits in business accounts,
    transfers funds from business to personal accounts or vice versa, or uses personal
    accounts or personal credit cards to make business payments.
  product_types:
  - depository
  - credit_card
  industry_types:
