  issued_date: '2024-10-23'
  risk_level: high
  category: trade_based_money_laundering
  source_url: https://www.fincen.gov/system/files/shared/FinCEN-Alert-Hizballah-Alert-508C.pdf
- id: 006_hizballah_financing-07
  description: Documentation, such as bills of lading and shipping invoices, appears
    to be falsified or omits key information, or there are inconsistencies between
    shipping related documents and maritime database entries.
  product_types:
